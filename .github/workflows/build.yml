name: Build OpenWrt for Xiaomi RD28

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget swig \
          libpython3-dev libelf-dev pkg-config lzma quilt

    - name: Clone OpenWrt mainline
      run: |
        git clone --depth=1 https://github.com/openwrt/openwrt.git openwrt
        echo "OpenWrt cloned"
        ls openwrt/target/linux/qualcommax/ || echo "qualcommax not found"

    - name: Add Xiaomi RD28 device files
      run: |
        set -e
        DTS_DIR="openwrt/target/linux/qualcommax/files/arch/arm/boot/dts"
        mkdir -p "$DTS_DIR"
        cp qcom-ipq5018-rd28.dts "$DTS_DIR/"
        echo "DTS copied"

        # Add device entry to ipq50xx.mk
        IPQ50XX_MK="openwrt/target/linux/qualcommax/image/ipq50xx.mk"
        if [ -f "$IPQ50XX_MK" ]; then
          cat >> "$IPQ50XX_MK" << 'DEVEOF'

define Device/xiaomi_rd28
  $(call Device/FitImage)
  $(call Device/UbiFit)
  DEVICE_VENDOR := Xiaomi
  DEVICE_MODEL := RD28
  DEVICE_VARIANT := AX3000 NE
  SOC := ipq5018
  DEVICE_DTS_CONFIG := config@mp03.3
  BLOCKSIZE := 128k
  PAGESIZE := 2048
  KERNEL_IN_UBI := 1
  DEVICE_PACKAGES := ath11k-firmware-ipq5018-qcn6122 \
	kmod-ath11k-ahb kmod-ath11k-pci
endef
TARGET_DEVICES += xiaomi_rd28
DEVEOF
          echo "Device entry added to ipq50xx.mk"
        else
          echo "ERROR: ipq50xx.mk not found!"
          ls openwrt/target/linux/qualcommax/image/
          exit 1
        fi

        # Add network config
        BOARD_DIR="openwrt/target/linux/qualcommax/ipq50xx/base-files/etc/board.d"
        mkdir -p "$BOARD_DIR"
        NETFILE="$BOARD_DIR/02_network"
        if [ -f "$NETFILE" ]; then
          # Add xiaomi,rd28 before the wildcard case
          python3 - "$NETFILE" << 'PYEOF'
        import sys, re
        f = open(sys.argv[1]); c = f.read(); f.close()
        insert = '\nxiaomi,rd28)\n\tucidef_set_interfaces_lan_wan "lan" "wan"\n\t;;\n'
        c = re.sub(r'(\n\t\*\))', insert + r'\1', c, count=1)
        f = open(sys.argv[1], 'w'); f.write(c); f.close()
        print("Network config updated")
PYEOF
        fi

        # Caldata extraction hotplug script
        HOTPLUG="openwrt/target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware"
        mkdir -p "$HOTPLUG"
        cat > "$HOTPLUG/11-ath11k-caldata-rd28" << 'CALEOF'
#!/bin/sh
[ "$(board_name)" = "xiaomi,rd28" ] || exit 0
ART=$(cat /proc/mtd | awk -F: '/0:ART/{print $1}')
[ -n "$ART" ] || ART="mtd13"
mkdir -p /lib/firmware/ath11k/IPQ5018/hw1.0
dd if=/dev/${ART} of=/lib/firmware/ath11k/IPQ5018/hw1.0/caldata.bin \
    bs=4096 skip=1 count=256 2>/dev/null
mkdir -p /lib/firmware/ath11k/QCN6122/hw1.0
dd if=/dev/${ART} of=/lib/firmware/ath11k/QCN6122/hw1.0/caldata.bin \
    bs=4096 skip=40 count=256 2>/dev/null
CALEOF
        chmod +x "$HOTPLUG/11-ath11k-caldata-rd28"
        echo "Caldata script added"

    - name: Update feeds
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a 2>&1 | tail -5
        ./scripts/feeds install -a 2>&1 | tail -5

    - name: Configure build
      working-directory: openwrt
      run: |
        cat > .config << 'CONFIG_EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq50xx=y
        CONFIG_TARGET_MULTI_PROFILE=n
        CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_xiaomi_rd28=y
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_PACKAGE_kmod-ath11k=y
        CONFIG_PACKAGE_kmod-ath11k-ahb=y
        CONFIG_PACKAGE_kmod-ath11k-pci=y
        CONFIG_PACKAGE_ath11k-firmware-ipq5018-qcn6122=y
        CONFIG_PACKAGE_ppp=y
        CONFIG_PACKAGE_ppp-mod-pppoe=y
        CONFIG_PACKAGE_nano=y
        CONFIG_EOF
        make defconfig
        echo "=== Target devices configured ==="
        grep "xiaomi_rd28" .config || echo "WARNING: xiaomi_rd28 not in config!"

    - name: Build (download only first)
      working-directory: openwrt
      run: make download -j$(nproc) 2>&1 | grep -E "ERROR|error" | head -20 || true

    - name: Build firmware
      working-directory: openwrt
      run: |
        make -j$(nproc) 2>&1 | tee /tmp/build.log
        echo "Build exit code: $?"

    - name: Check build results
      working-directory: openwrt
      if: always()
      run: |
        echo "=== Build output ==="
        ls -la bin/targets/qualcommax/ipq50xx/ 2>/dev/null || echo "No output directory"
        ls -la bin/targets/qualcommax/ipq50xx/*rd28* 2>/dev/null || echo "No RD28 images"
        echo "=== Last build log lines ==="
        tail -30 /tmp/build.log 2>/dev/null || true

    - name: Upload firmware images
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: openwrt-xiaomi-rd28
        path: |
          openwrt/bin/targets/qualcommax/ipq50xx/*rd28*
          openwrt/bin/targets/qualcommax/ipq50xx/config.buildinfo
        retention-days: 30

    - name: Upload build log (on failure)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7
