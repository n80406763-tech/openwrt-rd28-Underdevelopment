name: Build OpenWrt for Xiaomi RD28

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget swig \
          libpython3-dev libelf-dev pkg-config lzma quilt

    - name: Clone OpenWrt mainline
      run: |
        git clone --depth=1 https://github.com/openwrt/openwrt.git openwrt
        echo "OpenWrt cloned"
        ls openwrt/target/linux/qualcommax/ || echo "qualcommax not found"

    - name: Add Xiaomi RD28 device files
      run: |
        set -e

        DTS_DIR="openwrt/target/linux/qualcommax/files/arch/arm/boot/dts"
        mkdir -p "$DTS_DIR"
        cp qcom-ipq5018-rd28.dts "$DTS_DIR/"
        echo "DTS copied"

        python3 patch_openwrt.py openwrt

        HOTPLUG="openwrt/target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware"
        mkdir -p "$HOTPLUG"
        cp files/11-ath11k-caldata-rd28 "$HOTPLUG/"
        chmod +x "$HOTPLUG/11-ath11k-caldata-rd28"
        echo "Caldata script added"

    - name: Update feeds
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a 2>&1 | tail -5
        ./scripts/feeds install -a 2>&1 | tail -5

    - name: Configure build
      working-directory: openwrt
      run: |
        cp ../files/openwrt.config .config
        make defconfig
        echo "=== Target devices configured ==="
        grep "xiaomi_rd28" .config || echo "WARNING: xiaomi_rd28 not in config!"

    - name: Download sources
      working-directory: openwrt
      run: make download -j$(nproc) 2>&1 | grep -E "^ERROR" | head -20 || true

    - name: Build firmware
      working-directory: openwrt
      run: |
        make -j$(nproc) 2>&1 | tee /tmp/build.log
        echo "Build exit code $?"

    - name: Check build results
      working-directory: openwrt
      if: always()
      run: |
        echo "=== Build output ==="
        ls -la bin/targets/qualcommax/ipq50xx/ 2>/dev/null || echo "No output directory"
        ls -la bin/targets/qualcommax/ipq50xx/*rd28* 2>/dev/null || echo "No RD28 images"
        echo "=== Last 30 log lines ==="
        tail -30 /tmp/build.log 2>/dev/null || true

    - name: Upload firmware images
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: openwrt-xiaomi-rd28
        path: |
          openwrt/bin/targets/qualcommax/ipq50xx/*rd28*
          openwrt/bin/targets/qualcommax/ipq50xx/config.buildinfo
        retention-days: 30

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7
